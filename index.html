<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>For You 🤍</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #e5ddd5;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* แชท */
.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

/* บับเบิล */
.bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 15px;
    margin: 5px 0;
    font-size: 14px;
}

.bot {
    background: white;
    margin-right: auto;
}

.me {
    background: #dcf8c6;
    margin-left: auto;
}

/* input */
.input-area {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
}

textarea {
    flex: 1;
    border-radius: 10px;
    border: none;
    padding: 10px;
}

button {
    margin-left: 5px;
    border: none;
    border-radius: 10px;
    padding: 10px;
    background: #ffb6c1;
    color: white;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

/* 💓 หัวใจ */
.heart {
    position: absolute;
    color: pink;
    font-size: 12px;
    animation: floatUp 1s linear forwards;
}

@keyframes floatUp {
    from {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    to {
        transform: translateY(-40px) scale(1.5);
        opacity: 0;
    }
}

/* ปุ่มกลางจอ */
.next-btn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ffb6c1;
    color: white;
    padding: 15px 25px;
    border-radius: 15px;
    display: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-area">
    <textarea id="input" placeholder="พิมพ์ระบายได้เลย..."></textarea>
    <button onclick="send(this)">ส่ง</button>
</div>

<div class="next-btn" id="nextBtn" onclick="goNext()">ไปต่อ 🤍</div>

<!-- 🎵 เพลง -->
<audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// ⌨️ พิมพ์ทีละตัว
function typeText(element, text, speed = 30) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerText += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

// เพิ่มบับเบิล
function addBubble(text, type, typing=false) {
    let div = document.createElement("div");
    div.className = "bubble " + type;

    if (typing) {
        typeText(div, text);
    } else {
        div.innerText = text;
    }

    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
}

// 💓 เอฟเฟกต์หัวใจ
function heartEffect(btn) {
    for (let i = 0; i < 5; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "💓";
        heart.style.left = Math.random() * 50 + "px";
        btn.appendChild(heart);

        setTimeout(() => heart.remove(), 1000);
    }
}

// 🎵 fade in เพลง
function playMusic() {
    let audio = document.getElementById("bgm");
    audio.volume = 0;
    audio.play();

    let vol = 0;
    let fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            audio.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 200);
}

// 🔥 ข้อความแรก
window.onload = function() {
    addBubble("ตอนนี้มันหนักแค่ไหน...เล่าให้เราฟังได้นะ 🤍", "bot", true);
};

let sent = false;

function send(btn) {
    let text = document.getElementById("input").value.trim();
    if (!text) return;

    addBubble(text, "me");
    document.getElementById("input").value = "";

    heartEffect(btn);

    setTimeout(() => {
        addBubble(
        "ผมรับทราบแล้วงับ เก่งมากที่ผ่านมาถึงตรงนี้ได้ ไม่ว่าจะเกิดอะไรขึ้นยังมีผมอยู่เสมอที่คอยรับฟัง อยู่ข้าง ๆ ไม่ว่าจะเลวร้ายขนาดไหน พี่ยังมีผมอยู่แน่นอน 🤍",
        "bot",
        true
        );

        document.getElementById("nextBtn").style.display = "block";

    }, 500);

    if (!sent) {
        playMusic();
        sent = true;
    }
}

function goNext() {
    window.location.href = "page2.html";
}
</script>

</body>
</html>
