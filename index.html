<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>For You 🤍</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #e5ddd5;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 15px;
    margin: 5px 0;
    font-size: 14px;
}

.bot { background: white; margin-right: auto; }
.me { background: #dcf8c6; margin-left: auto; }

.input-area {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
}

textarea {
    flex: 1;
    border-radius: 10px;
    border: none;
    padding: 10px;
}

button {
    margin-left: 5px;
    border: none;
    border-radius: 10px;
    padding: 10px;
    background: #ffb6c1;
    color: white;
    cursor: pointer;
    position: relative;
}

/* 💓 หัวใจ */
.heart {
    position: absolute;
    color: pink;
    animation: floatUp 1s linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-40px); opacity: 0; }
}

/* ปุ่มกลางจอ */
.next-btn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ffb6c1;
    color: white;
    padding: 15px 25px;
    border-radius: 15px;
    display: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-area">
    <textarea id="input" placeholder="พิมพ์ระบายได้เลย..."></textarea>
    <button onclick="send(this)">ส่ง</button>
</div>

<div class="next-btn" id="nextBtn" onclick="goNext()">ไปต่อ 🤍</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 Firebase config ของคุณ
const firebaseConfig = {
  apiKey: "AIzaSyCquKO0dfib9VPLiVw8VoMglElIaaT65Pc",
  authDomain: "for-you-78a52.firebaseapp.com",
  projectId: "for-you-78a52"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ⌨️ พิมพ์ทีละตัว
function typeText(el, text, speed = 30) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            el.innerText += text[i];
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

function addBubble(text, type, typing=false) {
    let div = document.createElement("div");
    div.className = "bubble " + type;

    if (typing) {
        typeText(div, text);
    } else {
        div.innerText = text;
    }

    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
}

// 💓 เอฟเฟกต์หัวใจ
function heartEffect(btn) {
    for (let i = 0; i < 5; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "💓";
        heart.style.left = Math.random() * 40 + "px";
        btn.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    }
}

// 🔥 ข้อความแรก
window.onload = () => {
    addBubble("ตอนนี้มันหนักแค่ไหน...เล่าให้เราฟังได้นะ 🤍", "bot", true);
};

// 🚀 ฟังก์ชันส่ง
window.send = async function(btn) {
    let text = document.getElementById("input").value.trim();
    if (!text) return;

    addBubble(text, "me");
    document.getElementById("input").value = "";

    heartEffect(btn);

    try {
        // 🔥 เซฟ Firebase
        await addDoc(collection(db, "messages"), {
            message: text,
            time: new Date()
        });
        console.log("บันทึกแล้ว");
    } catch (e) {
        console.log("Firebase error:", e);
    }

    setTimeout(() => {
        addBubble(
        "ผมรับทราบแล้วงับ เก่งมากที่ผ่านมาถึงตรงนี้ได้ ไม่ว่าจะเกิดอะไรขึ้นยังมีผมอยู่เสมอที่คอยรับฟัง อยู่ข้าง ๆ ไม่ว่าจะเลวร้ายขนาดไหน พี่ยังมีผมอยู่แน่นอน 🤍",
        "bot",
        true
        );

        document.getElementById("nextBtn").style.display = "block";
    }, 500);
}

window.goNext = function() {
    window.location.href = "page2.html";
}
</script>

</body>
</html>
